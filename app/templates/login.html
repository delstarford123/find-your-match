{% extends "base.html" %}

{% block content %}
<style>
    /* Clean, consistent layout for Auth pages */
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 40px 20px;
    }
    .auth-card {
        background: white;
        padding: 50px 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(128, 0, 0, 0.08);
        border: 1px solid #ffccd5;
        width: 100%;
        max-width: 450px;
    }
    .auth-header { text-align: center; margin-bottom: 35px; }
    .auth-title { color: #800000; font-size: 32px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.5px; }
    .auth-subtitle { color: #666; font-size: 15px; }

    .input-group { margin-bottom: 25px; }
    .input-group label {
        display: block; font-size: 13px; font-weight: 800; color: #4a0404;
        margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .input-group input {
        width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 12px;
        font-size: 15px; background: #fafafa; transition: all 0.3s ease;
        font-family: inherit; outline: none;
    }
    .input-group input:focus {
        border-color: #ff2a4b; background: white; box-shadow: 0 0 0 4px rgba(255, 42, 75, 0.1);
    }

    .btn-submit {
        width: 100%; background: linear-gradient(135deg, #ff2a4b 0%, #800000 100%);
        color: white; border: none; padding: 18px; border-radius: 12px;
        font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
        box-shadow: 0 10px 20px rgba(255, 42, 75, 0.2);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 42, 75, 0.3); }
    
    .auth-footer { text-align: center; margin-top: 30px; font-size: 14px; color: #666; }
    .auth-footer a { color: #ff2a4b; font-weight: 800; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size: 45px; margin-bottom: 15px;"></div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Log in to view your newest matches.</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="e.g. name@example.com">
            </div>
            
            <div class="input-group">
                <label for="reg_number">MMUST Registration Number</label>
                <input type="text" id="reg_number" name="reg_number" required placeholder="SAB/B/01-0000/2023">
            </div>

            <button type="submit" class="btn-submit">Secure Log In</button>
        </form>
        
        <div class="auth-footer">
            New here? <a href="{{ url_for('auth.signup') }}">Create an account</a>.
        </div>
    </div>
</div>
{% endblock %}
