{% extends "base.html" %}

{% block content %}
<style>
    /* === ANIMATIONS === */
    @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* === LAYOUT === */
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        /* Takes up full height minus navbar/footer, with fallback */
        min-height: calc(100vh - 150px); 
        padding: clamp(20px, 5vw, 40px) 15px;
    }
    
    .auth-card {
        background: white;
        /* Fluid padding: smaller on phones, larger on desktop */
        padding: clamp(30px, 8vw, 50px) clamp(20px, 6vw, 40px);
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(114, 0, 0, 0.08); /* Tinted maroon shadow */
        border: 1px solid #FFD6DD;
        width: 100%;
        max-width: 450px;
        animation: slideUpFade 0.5s ease-out forwards;
    }
    
    /* === TYPOGRAPHY === */
    .auth-header { 
        text-align: center; 
        margin-bottom: clamp(25px, 6vw, 35px); 
    }
    .auth-title { 
        color: #720000; 
        font-size: clamp(26px, 6vw, 32px); 
        font-weight: 900; 
        margin-bottom: 8px; 
        letter-spacing: -0.5px; 
    }
    .auth-subtitle { 
        color: #666; 
        font-size: 15px; 
    }

    /* === FORM INPUTS === */
    .input-group { 
        margin-bottom: 20px; 
    }
    .input-group label {
        display: block; 
        font-size: 12px; 
        font-weight: 800; 
        color: #4A0008;
        margin-bottom: 8px; 
        text-transform: uppercase; 
        letter-spacing: 0.5px;
    }
    .input-group input {
        width: 100%; 
        padding: 15px; 
        border: 2px solid #f0f0f0; 
        border-radius: 12px;
        /* 16px is REQUIRED to stop iOS Safari from auto-zooming into the page */
        font-size: 16px; 
        background: #fafafa; 
        transition: all 0.3s ease;
        font-family: inherit; 
        outline: none;
        -webkit-appearance: none; /* Removes default iOS styling */
    }
    .input-group input:focus {
        border-color: #E60026; 
        background: white; 
        box-shadow: 0 0 0 4px rgba(230, 0, 38, 0.1);
    }
    .input-group input::placeholder {
        color: #aaa;
    }

    /* === BUTTONS & LINKS === */
    .btn-submit {
        width: 100%; 
        background: linear-gradient(135deg, #720000 0%, #E60026 100%);
        color: white; 
        border: none; 
        padding: 16px; 
        border-radius: 12px;
        font-size: 16px; 
        font-weight: 800; 
        cursor: pointer; 
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 8px 20px rgba(230, 0, 38, 0.2);
        margin-top: 10px;
    }
    .btn-submit:active {
        transform: scale(0.98);
    }
    
    @media (hover: hover) {
        .btn-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(230, 0, 38, 0.3); 
        }
    }
    
    .auth-footer { 
        text-align: center; 
        margin-top: 25px; 
        font-size: 14px; 
        color: #666; 
    }
    .auth-footer a { 
        color: #E60026; 
        font-weight: 800; 
        text-decoration: none; 
        transition: color 0.2s;
    }
    .auth-footer a:hover { 
        color: #720000; 
        text-decoration: underline; 
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div style="font-size: 45px; margin-bottom: 10px; display: flex; justify-content: center;">
                <div style="background: #FEF2F4; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(230,0,38,0.1);">
                    👋
                </div>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Log in to view your newest matches.</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="e.g. name@example.com">
            </div>
            
            <div class="input-group">
                <label for="reg_number">Registration Number</label>
                <input type="text" id="reg_number" name="reg_number" required placeholder="SAB/B/01-0000/2023">
            </div>

            <button type="submit" class="btn-submit">Secure Log In</button>
        </form>
        
        <div class="auth-footer">
            New here? <a href="{{ url_for('auth.signup') }}">Create an account</a>.
        </div>
    </div>
</div>
{% endblock %}
