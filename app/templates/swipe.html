{% extends "base.html" %}

{% block content %}
<style>
    /* === CORE LAYOUT === */
    .deck-wrapper {
        display: flex; justify-content: center; align-items: center;
        height: calc(100vh - var(--nav-height) - 10px);
        padding: 10px; perspective: 1000px; overflow: hidden;
        background: #f4f6f8; /* Soft background to make the card pop */
    }
    
    .deck-container { position: relative; width: 100%; max-width: 380px; height: 90vh; max-height: 700px; }
    
    /* === THE CARD (FULL BLEED) === */
    .card { 
        background: white; border-radius: 20px; overflow: hidden; 
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15); height: 100%; width: 100%;
        display: flex; flex-direction: column; position: absolute;
        transition: transform 0.3s ease, opacity 0.3s ease;
        will-change: transform; cursor: grab;
        border: 1px solid rgba(255,255,255,0.5); /* Subtle edge highlight */
    }
    .card:active { cursor: grabbing; }
    
    /* === IMAGE & GRADIENT === */
    .image-container { 
        position: absolute; inset: 0; /* Takes up 100% of the card */
        background: #e0e0e0; overflow: hidden;
    }
    #profile-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    
    /* Tinder-style gradient overlay for text readability */
    .card-info { 
        position: absolute; bottom: 0; left: 0; right: 0; 
        padding: 120px 20px 100px; /* Extra padding at bottom for floating buttons */
        background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0) 100%); 
        color: white; pointer-events: none;
    }
    
    .name-age-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    #profile-name { font-size: 32px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.5); margin: 0; }
    #profile-age { font-size: 24px; font-weight: 400; opacity: 0.9; }
    #profile-bio { margin: 5px 0 0; font-size: 15px; line-height: 1.4; opacity: 0.9; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    
    .badge { 
        background: var(--primary); color: white; padding: 4px 10px; border-radius: 12px; 
        font-size: 10px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
        box-shadow: 0 4px 10px rgba(230, 0, 38, 0.5); display: inline-block; margin-bottom: 8px;
    }

    /* === TINDER DRAG STAMPS (LIKE / NOPE) === */
    .stamp {
        position: absolute; top: 50px; padding: 5px 15px; border: 4px solid; border-radius: 10px;
        font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
        opacity: 0; z-index: 100; pointer-events: none;
    }
    .stamp-nope { color: #fd5c63; border-color: #fd5c63; right: 30px; transform: rotate(15deg); }
    .stamp-like { color: #2de2a6; border-color: #2de2a6; left: 30px; transform: rotate(-15deg); }
    
    /* === FLOATING ACTION BUTTONS === */
    .action-buttons { 
        position: absolute; bottom: 20px; left: 0; right: 0; 
        display: flex; justify-content: center; align-items: center; gap: 25px; 
        z-index: 10; padding: 0 20px;
    }
    .btn-action { 
        width: 64px; height: 64px; border-radius: 50%; border: none; 
        font-size: 32px; display: flex; align-items: center; justify-content: center; 
        cursor: pointer; background: white; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    /* Tinder Colors: Red X, Green Heart */
    .btn-action.pass { color: #fd5c63; }
    .btn-action.like { color: #2de2a6; }
    
    .btn-action:hover { transform: scale(1.15) translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
    .btn-action:active { transform: scale(0.9); }

    /* Small center button for super-like/AI trigger (optional) */
    .btn-small { width: 44px; height: 44px; font-size: 20px; color: #3498db; }

    /* === MATCH CELEBRATION OVERLAY === */
    #match-overlay { 
        display: none; position: fixed; inset: 0; 
        background: rgba(0, 0, 0, 0.9); z-index: 10000; 
        flex-direction: column; align-items: center; justify-content: center; 
        text-align: center; color: white; padding: 20px; backdrop-filter: blur(10px);
    }
    .match-title { font-size: 60px; font-weight: 900; margin-bottom: 0; color: #2de2a6; font-style: italic; letter-spacing: -2px;}
    .match-avatars { display: flex; gap: -20px; margin: 40px 0; }
    .match-avatar { width: 140px; height: 140px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 0 30px rgba(45, 226, 166, 0.4); }
    
    #icebreaker-container { width: 100%; max-width: 350px; margin-top: 20px; }
    .ice-bubble { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); padding: 15px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 15px; text-align: left; }
    .ice-bubble:hover { background: white; color: black; transform: scale(1.02); }

    .hidden { display: none !important; }
</style>

<div class="deck-wrapper">
    <div class="deck-container">
        
        <div id="profile-card" class="card">
            <div id="active-profile" style="flex: 1; position: relative;">
                
                <div class="image-container">
                    <img id="profile-img" src="" alt="Student Profile">
                    <div id="shimmer" class="shimmer" style="width:100%; height:100%; background: #eee;"></div>
                    
                    <div id="stamp-nope" class="stamp stamp-nope">NOPE</div>
                    <div id="stamp-like" class="stamp stamp-like">LIKE</div>
                    
                    <div class="card-info">
                        <span id="ai-tag" class="badge hidden">✨ AI TOP PICK</span>
                        <div class="name-age-row">
                            <h2 id="profile-name">Connecting...</h2>
                            <span id="profile-age"></span>
                        </div>
                        <p id="profile-bio">Looking for matches at MMUST...</p>
                    </div>
                </div>
            </div>

            <div id="empty-state" class="hidden" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; background: #fff;">
                <img src="{{ url_for('static', filename='img/radar.gif') }}" style="width: 100px; opacity: 0.5; margin-bottom: 20px; border-radius: 50%;" alt="Searching">
                <h2 style="color: #111; font-weight: 800; font-size: 24px;">There's no one new around you.</h2>
                <p style="color: #666; margin: 15px 0 25px;">Expand your discovery settings or check back after your next class.</p>
                <button class="btn-action btn-small" style="width: auto; padding: 10px 30px; border-radius: 20px; background: linear-gradient(90deg, #fd5c63, #E60026); color: white; font-weight: bold; font-size: 14px;" onclick="window.location.href='/settings'">Adjust Filters</button>
            </div>
            
            <div class="action-buttons" id="swipe-buttons">
                <button onclick="window.handleSwipe('pass')" class="btn-action pass">✕</button>
                <button onclick="window.handleSwipe('like')" class="btn-action like">❤</button>
            </div>
        </div>
    </div>
</div>

<div id="match-overlay">
    <h1 class="match-title">IT'S A MATCH!</h1>
    <p style="font-size: 18px; opacity: 0.9;">You and <span id="match-name-celeb" style="font-weight: bold;"></span> liked each other.</p>
    
    <div class="match-avatars">
        <img src="{{ session.get('user_img') or '/static/img/placeholder.png' }}" class="match-avatar" style="transform: translateX(15px);">
        <img id="match-avatar-celeb" src="" class="match-avatar" style="transform: translateX(-15px); z-index: 2;">
    </div>

    <div id="icebreaker-container">
        </div>

    <button onclick="window.location.href='/matches'" class="btn-action" style="background: #2de2a6; color: white; width: 100%; max-width: 300px; padding: 18px; border-radius: 30px; font-weight: 900; font-size: 16px; margin-top: 20px; height: auto;">Send Message</button>
    <button onclick="closeMatchOverlay()" style="background: transparent; color: white; border: none; margin-top: 15px; cursor: pointer; font-weight: 600; font-size: 14px; opacity: 0.7;">KEEP SWIPING</button>
</div>

<script>
    window.currentUserId = "{{ session.get('user_id') }}";
    const chimeSuccess = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3");

    // Match Celebration with Icebreakers
    window.triggerMatchCelebration = function(matchData) {
        document.getElementById('match-name-celeb').innerText = matchData.name.split(' ')[0]; // First name only
        document.getElementById('match-avatar-celeb').src = matchData.img || "/static/img/placeholder.png";
        
        // Haptics & Sound
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        chimeSuccess.play();

        // Fetch AI Icebreakers
        const container = document.getElementById('icebreaker-container');
        fetch('/api/icebreakers', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ match_bio: matchData.bio })
        })
        .then(res => res.json())
        .then(data => {
            const lines = data.icebreakers ? data.icebreakers.split('\n') : ["Hey! Let's chat."];
            container.innerHTML = '<p style="font-size: 11px; font-weight: bold; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 10px;">AI ICEBREAKERS</p>';
            lines.forEach(text => {
                if(!text.trim()) return;
                const div = document.createElement('div');
                div.className = 'ice-bubble';
                div.innerText = text.replace(/^\d+\.\s*/, '');
                div.onclick = () => {
                    navigator.clipboard.writeText(div.innerText);
                    div.innerText = "✅ Copied to clipboard!";
                    div.style.background = "#2de2a6";
                    div.style.color = "white";
                    setTimeout(() => {
                        div.innerText = text;
                        div.style.background = "rgba(255,255,255,0.15)";
                    }, 2000);
                };
                container.appendChild(div);
            });
        });

        document.getElementById('match-overlay').style.display = 'flex';
    };

    function closeMatchOverlay() {
        document.getElementById('match-overlay').style.display = 'none';
        if(typeof window.loadNextProfile === 'function') window.loadNextProfile();
    }
</script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
