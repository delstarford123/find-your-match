{% extends "base.html" %}

{% block content %}
<style>
    /* === GLOBAL NOTIFICATION BELL === */
    .floating-bell {
        position: fixed;
        top: 20px;
        right: 20px;
        background: white;
        border: 2px solid #FFD6DD;
        color: #720000;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(114, 0, 0, 0.15);
        z-index: 9999;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .floating-bell:hover { transform: scale(1.1); }
    .floating-bell:active { transform: scale(0.9); }

    .bell-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        background: #E60026;
        color: white;
        font-size: 11px;
        font-weight: 900;
        min-width: 22px;
        height: 22px;
        border-radius: 11px;
        padding: 0 4px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid white;
        box-shadow: 0 2px 8px rgba(230, 0, 38, 0.4);
        display: none; /* Hidden by default */
        animation: pulseMatch 2s infinite;
    }

    /* === NOTIFICATION POPOVER MENU === */
    .bell-popover {
        position: fixed;
        top: 80px;
        right: 20px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        width: 320px;
        z-index: 10000;
        border: 1px solid #FFD6DD;
        display: none;
        flex-direction: column;
        overflow: hidden;
        transform-origin: top right;
        animation: popIn 0.2s ease-out forwards;
    }
    .bell-popover.active { display: flex; }

    .popover-header {
        padding: 15px;
        background: linear-gradient(90deg, #720000 0%, #E60026 100%);
        color: white;
        font-weight: 900;
        font-size: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .popover-list { max-height: 350px; overflow-y: auto; }
    .popover-item {
        padding: 12px 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
        transition: 0.2s;
        background: white;
    }
    .popover-item:hover { background: #FEF2F4; }
    .popover-item:last-child { border-bottom: none; }

    .popover-unread-count {
        background: #E60026; color: white; border-radius: 10px;
        padding: 2px 8px; font-size: 11px; font-weight: 900; flex-shrink: 0;
    }

    @media (max-width: 768px) {
        .floating-bell { top: 15px; right: 15px; width: 45px; height: 45px; font-size: 20px; }
        .bell-popover { top: 70px; right: 15px; left: 15px; width: auto; }
    }

    @keyframes popIn {
        0% { opacity: 0; transform: scale(0.9) translateY(-10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* === CORE LAYOUT & RESPONSIVE SIZING === */
    .deck-wrapper {
        display: flex; justify-content: center; align-items: center;
        height: calc(100vh - var(--nav-height, 70px) - 20px); 
        width: 100%; padding: 10px; perspective: 1000px; 
        overflow: hidden; background: #f4f6f8; 
    }
    
    .deck-container { 
        position: relative; width: 95vw; max-width: 420px; 
        height: 80vh; max-height: 680px; min-height: 500px;
    }
    
    /* === THE CARD (FULL BLEED) === */
    .card { 
        background: white; border-radius: 24px; overflow: hidden; 
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12); 
        position: absolute; inset: 0; display: flex; flex-direction: column; 
        transition: transform 0.3s ease, opacity 0.3s ease;
        will-change: transform; cursor: grab;
        border: 1px solid rgba(255,255,255,0.5); z-index: 5; 
    }
    .card:active { cursor: grabbing; }
    
    /* === MATCH SIGNAL BADGE === */
    #is-match-signal {
        position: absolute; top: 25px; right: 25px;
        background: linear-gradient(135deg, #FF4B2B 0%, #E60026 100%); color: white;
        padding: 8px 16px; border-radius: 30px; font-weight: 900;
        font-size: 13px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(230, 0, 38, 0.4);
        z-index: 100; display: none; animation: pulseBadge 1.5s infinite; pointer-events: none;
    }
    @keyframes pulseBadge {
        0% { transform: scale(1); box-shadow: 0 4px 15px rgba(230, 0, 38, 0.4); }
        50% { transform: scale(1.1); box-shadow: 0 8px 25px rgba(230, 0, 38, 0.6); }
        100% { transform: scale(1); box-shadow: 0 4px 15px rgba(230, 0, 38, 0.4); }
    }

    /* === IMAGE & GRADIENT === */
    .image-container { position: absolute; inset: 0; background: #e0e0e0; overflow: hidden; }
    #profile-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    
    .card-info { 
        position: absolute; bottom: 0; left: 0; right: 0; 
        padding: 120px 20px 110px; 
        background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%); 
        color: white; pointer-events: none;
    }
    
    .name-age-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    #profile-name { font-size: 32px; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.5); margin: 0; }
    #profile-age { font-size: 24px; font-weight: 400; opacity: 0.9; }
    #profile-bio { margin: 5px 0 0; font-size: 15px; line-height: 1.4; opacity: 0.9; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* === TINDER DRAG STAMPS === */
    .stamp {
        position: absolute; top: 50px; padding: 5px 15px; border: 4px solid; border-radius: 10px;
        font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
        opacity: 0; z-index: 100; pointer-events: none;
    }
    .stamp-nope { color: #fd5c63; border-color: #fd5c63; right: 30px; transform: rotate(15deg); }
    .stamp-like { color: #2de2a6; border-color: #2de2a6; left: 30px; transform: rotate(-15deg); }
    
    /* === FLOATING ACTION BUTTONS === */
    .action-buttons { 
        position: absolute; bottom: 25px; left: 0; right: 0; 
        display: flex; justify-content: center; align-items: center; gap: 30px; 
        z-index: 10; padding: 0 20px;
    }
    .btn-action { 
        width: 68px; height: 68px; border-radius: 50%; border: none; 
        font-size: 34px; display: flex; align-items: center; justify-content: center; 
        cursor: pointer; background: white; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .btn-action.pass { color: #fd5c63; }
    .btn-action.like { color: #2de2a6; }
    .btn-action:hover { transform: scale(1.15); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

    /* === MATCH OVERLAY === */
    #match-overlay { 
        display: none; position: fixed; inset: 0; 
        background: rgba(0, 0, 0, 0.9); z-index: 10000; 
        flex-direction: column; align-items: center; justify-content: center; 
        text-align: center; color: white; padding: 20px; backdrop-filter: blur(10px);
    }
    .match-title { font-size: 60px; font-weight: 900; color: #2de2a6; font-style: italic; margin-bottom: 0; }
    .match-avatars { display: flex; justify-content: center; gap: -20px; margin: 40px 0; }
    .match-avatar { width: 140px; height: 140px; border-radius: 50%; border: 4px solid white; object-fit: cover; }

    .ice-bubble { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 20px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 15px; text-align: left; }
    .ice-bubble:hover { background: white; color: black; }
    
    .hidden { display: none !important; }
</style>

<div class="floating-bell" id="global-bell" onclick="toggleBellPopover(event)">
    🔔
    <div class="bell-badge" id="bell-badge">0</div>
</div>

<div class="bell-popover" id="bell-popover">
    <div class="popover-header">
        <span>💬 New Messages</span>
        <button onclick="toggleBellPopover(event)" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer; line-height: 1;">×</button>
    </div>
    <div class="popover-list" id="bell-popover-list">
        <div style="padding: 30px; text-align: center; color: #888; font-size: 14px;">No new messages</div>
    </div>
</div>

<div class="deck-wrapper">
    <div class="deck-container">
        <div id="is-match-signal">ITS A MATCH! 🔥</div>

        <div id="profile-card" class="card">
            <div id="active-profile" style="flex: 1; position: relative;">
                <div class="image-container">
                    <img id="profile-img" src="" alt="Student Profile">
                    <div id="shimmer" class="shimmer" style="width:100%; height:100%; background: #eee;"></div>
                    
                    <div id="stamp-nope" class="stamp stamp-nope">NOPE</div>
                    <div id="stamp-like" class="stamp stamp-like">LIKE</div>
                    
                    <div class="card-info">
                        <div class="name-age-row">
                            <h2 id="profile-name">Connecting...</h2>
                            <span id="profile-age"></span>
                        </div>
                        <p id="profile-bio">Searching for students at MMUST...</p>
                    </div>
                </div>
            </div>

            <div class="action-buttons" id="swipe-buttons">
                <button onclick="window.handleSwipe('pass')" class="btn-action pass">✕</button>
                <button onclick="window.handleSwipe('like')" class="btn-action like">❤</button>
            </div>
        </div>

        <div id="empty-state" class="hidden" style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <div style="font-size: 60px;">📡</div>
            <h2 style="color: #111; font-weight: 800;">No one new nearby.</h2>
            <p style="color: #666; margin-bottom: 20px;">Try expanding your discovery settings.</p>
            <button onclick="window.location.href='/settings'" style="padding: 12px 25px; border-radius: 25px; background: #E60026; color: white; border: none; font-weight: bold;">Adjust Filters</button>
        </div>
    </div>
</div>

<div id="match-overlay">
    <h1 class="match-title">IT'S A MATCH!</h1>
    <p>You and <span id="match-name-celeb" style="font-weight: bold;"></span> liked each other.</p>
    
    <div class="match-avatars">
        <img src="{{ current_user.img }}" class="match-avatar" style="transform: translateX(15px);">
        <img id="match-avatar-celeb" src="" class="match-avatar" style="transform: translateX(-15px);">
    </div>

    <div id="icebreaker-container" style="width: 100%; max-width: 350px;"></div>

    <button onclick="window.location.href='/matches'" class="btn-action" style="background:#2de2a6; color:white; width:100%; max-width:300px; border-radius:30px; font-size:16px; height:auto; padding:18px; margin-top: 20px;">SEND MESSAGE</button>
    <button onclick="closeMatchOverlay()" style="background:transparent; color:white; border:none; margin-top:15px; cursor:pointer; opacity:0.7;">KEEP SWIPING</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
<script>
    // --- Set global User ID for main.js ---
    window.currentUserId = "{{ current_user.id }}";

    // --- Swipe/Match Logic ---
    window.updateMatchSignal = function(isMutual) {
        const signal = document.getElementById('is-match-signal');
        if (signal) {
            signal.style.display = isMutual ? 'block' : 'none';
        }
    };

    window.triggerMatchCelebration = function(matchData) {
        document.getElementById('match-name-celeb').innerText = matchData.name.split(' ')[0];
        document.getElementById('match-avatar-celeb').src = matchData.img || "/static/img/placeholder.png";
        document.getElementById('match-overlay').style.display = 'flex';

        const container = document.getElementById('icebreaker-container');
        container.innerHTML = '<p style="font-size:11px; color:rgba(255,255,255,0.6); margin-bottom: 10px;">AI SUGGESTED ICEBREAKERS</p>';
        
        fetch('/api/icebreakers', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ match_bio: matchData.bio })
        })
        .then(res => res.json())
        .then(data => {
            const lines = data.icebreakers ? data.icebreakers.split('\n') : ["Hey! Let's chat."];
            lines.forEach(text => {
                if(!text.trim()) return;
                const div = document.createElement('div');
                div.className = 'ice-bubble';
                div.innerText = text.replace(/^\d+\.\s*/, '');
                div.onclick = () => {
                    navigator.clipboard.writeText(div.innerText);
                    div.innerText = " Copied!";
                    setTimeout(() => div.innerText = text, 2000);
                };
                container.appendChild(div);
            });
        });
    };

    function closeMatchOverlay() {
        document.getElementById('match-overlay').style.display = 'none';
        if(typeof window.loadNextProfile === 'function') window.loadNextProfile();
    }


    // ==========================================
    // GLOBAL BELL NOTIFICATION LOGIC
    // ==========================================
    const myId = "{{ session.get('user_id') }}";
    const socket = io();
    let unreadMap = JSON.parse(localStorage.getItem('mmust_unread_counts')) || {};
    let offlineQueue = JSON.parse(localStorage.getItem('mmust_offline_queue')) || {};

    function toggleBellPopover(e) {
        e.stopPropagation();
        const pop = document.getElementById('bell-popover');
        if (pop) pop.classList.toggle('active');
    }

    function updateBellUI() {
        const badge = document.getElementById('bell-badge');
        const list  = document.getElementById('bell-popover-list');
        if (!badge || !list) return;

        let totalUnread = 0;
        let popoverHtml = '';

        for (const [uid, data] of Object.entries(unreadMap)) {
            if (typeof data !== 'object') {
                 unreadMap[uid] = { count: data, text: "New Message" };
            }
            const count = unreadMap[uid].count;
            const msgText = unreadMap[uid].text;
            totalUnread += count;

            popoverHtml += `
                <div class="popover-item" onclick="window.location.href='/matches/${uid}'">
                    <div style="position:relative; flex-shrink:0;">
                        <img src="/static/img/placeholder.png" style="width:45px; height:45px; border-radius:50%; object-fit:cover; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.1);">
                        <span style="position:absolute; bottom:1px; right:1px; width:12px; height:12px; border-radius:50%; border:2px solid white; background:#28a745;"></span>
                    </div>
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight:800; font-size:14px; color:#111; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            New Match
                        </div>
                        <div style="font-size:12px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${msgText}
                        </div>
                    </div>
                    <span class="popover-unread-count">${count}</span>
                </div>
            `;
        }

        if (totalUnread > 0) {
            badge.textContent = totalUnread > 99 ? '99+' : totalUnread;
            badge.style.display = 'flex';
            list.innerHTML = popoverHtml;
            
            // Jiggle animation on new message
            const bell = document.getElementById('global-bell');
            bell.style.transform = 'scale(1.15) rotate(10deg)';
            setTimeout(() => { bell.style.transform = 'scale(1) rotate(0deg)'; }, 300);
        } else {
            badge.style.display = 'none';
            list.innerHTML = '<div style="padding:30px;text-align:center;color:#888;font-size:13px;">No new messages</div>';
        }
    }

    // Init UI on load
    updateBellUI();

    // Listen for new incoming messages while swiping
    socket.on('receive_message', function(data) {
        if (data.sender === myId || data.sender_id === myId || data.sender === 'SYSTEM_AI') return;

        let currentCount = 0;
        if (unreadMap[data.sender] && typeof unreadMap[data.sender] === 'object') {
             currentCount = unreadMap[data.sender].count || 0;
        } else if (typeof unreadMap[data.sender] === 'number') {
             currentCount = unreadMap[data.sender];
        }

        unreadMap[data.sender] = { count: currentCount + 1, text: data.text };
        localStorage.setItem('mmust_unread_counts', JSON.stringify(unreadMap));
        
        if (!offlineQueue[data.sender]) offlineQueue[data.sender] = [];
        offlineQueue[data.sender].push({
            text: data.text,
            timestamp: data.timestamp || new Date().toISOString()
        });
        localStorage.setItem('mmust_offline_queue', JSON.stringify(offlineQueue));

        updateBellUI();
    });

    // Close popover when clicking outside
    window.addEventListener('click', function(e) {
        const bellPop = document.getElementById('bell-popover');
        if (bellPop && bellPop.classList.contains('active') && !e.target.closest('#bell-popover') && !e.target.closest('#global-bell')) {
            bellPop.classList.remove('active');
        }
    });
</script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
