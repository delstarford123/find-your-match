{% extends "base.html" %}

{% block content %}
<style>
    .qr-container { max-width: 500px; margin: 60px auto; text-align: center; background: white; padding: 40px; border-radius: 24px; border: 2px solid #800000; }
    .qr-img { width: 250px; height: 250px; margin: 20px 0; border: 10px solid #fff0f3; border-radius: 20px; }
    .print-btn { background: #800000; color: white; padding: 12px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    @media print { .navbar, footer, .print-btn { display: none; } .qr-container { border: none; margin: 0; } }
</style>

<div class="qr-container">
    <h1 style="color: #800000;">{{ restaurant_name }}</h1>
    <p style="color: #666;">Students: Scan to Verify Your Discount</p>
    
    <img src="data:image/png;base64,{{ qr_code }}" class="qr-img" alt="Merchant QR">
    
    <div style="background: #fff0f3; padding: 15px; border-radius: 12px; margin-top: 20px;">
        <p style="font-size: 13px; color: #800000; font-weight: bold;">Instructions for Staff:</p>
        <p style="font-size: 12px; color: #4a0404;">If the student's screen turns <strong style="color: #10b981;">GREEN</strong>, they are an active subscriber. Apply the agreed discount.</p>
    </div>

    <button class="print-btn" onclick="window.print()">🖨️ Print Discount Card</button>
</div>
{% endblock %}
